<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏏 Cricket Auction</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        header h1 { font-size: 2.5em; margin-bottom: 5px; }
        header .subtitle { opacity: 0.7; }
        
        /* Login Screen */
        #loginScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }
        .login-box {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
        }
        .login-box h2 { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; opacity: 0.8; }
        .form-group select, .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255,255,255,0.9);
            color: #333;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary { background: #4CAF50; color: white; width: 100%; }
        .btn-bid { background: #ff6b6b; color: white; font-size: 1.5em; padding: 20px 50px; }
        .btn-admin { background: #6c5ce7; color: white; margin: 5px; }
        .btn-danger { background: #e74c3c; color: white; }
        
        /* Main App */
        #mainApp { display: none; }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat { text-align: center; }
        .stat-value { font-size: 1.8em; font-weight: bold; }
        .stat-label { font-size: 0.9em; opacity: 0.7; }
        
        /* Current Player Card */
        .auction-block {
            background: linear-gradient(145deg, #2d3436 0%, #000 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            border: 3px solid #ffd700;
        }
        .player-name { font-size: 2.5em; font-weight: bold; color: #ffd700; }
        .player-role { font-size: 1.2em; opacity: 0.8; margin: 10px 0; }
        .player-base { font-size: 1em; opacity: 0.6; }
        
        .bid-display {
            margin: 30px 0;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        .current-bid { font-size: 3em; font-weight: bold; color: #00ff88; }
        .current-bidder { font-size: 1.3em; margin-top: 10px; }
        
        .waiting-msg {
            font-size: 1.5em;
            opacity: 0.6;
            padding: 50px;
        }
        
        .status-sold { color: #00ff88; font-size: 2em; }
        .status-unsold { color: #ff6b6b; font-size: 2em; }
        
        /* Teams Grid */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .team-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            border-left: 5px solid;
        }
        .team-card.mine { box-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .team-name { font-size: 1.3em; font-weight: bold; }
        .team-budget { font-size: 1.5em; color: #00ff88; }
        .team-squad { max-height: 200px; overflow-y: auto; }
        .squad-player {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        .squad-player .price { color: #ffd700; }
        
        /* Admin Panel */
        .admin-panel {
            background: rgba(108, 92, 231, 0.2);
            border: 2px solid #6c5ce7;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .admin-panel h3 { margin-bottom: 15px; }
        
        /* Players List */
        .players-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
        }
        .players-section h3 { margin-bottom: 15px; }
        .players-table {
            width: 100%;
            border-collapse: collapse;
        }
        .players-table th, .players-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .players-table th { opacity: 0.7; }
        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
        }
        .status-upcoming { background: #3498db; }
        .status-sold { background: #27ae60; }
        .status-unsold { background: #e74c3c; }
        .status-bidding { background: #f39c12; }
        
        /* Pool Selector */
        .pool-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .pool-btn {
            padding: 10px 20px;
            border: 2px solid #6c5ce7;
            background: transparent;
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .pool-btn:hover { background: rgba(108, 92, 231, 0.3); }
        .pool-btn.active { background: #6c5ce7; }
        .pool-btn .pool-count {
            font-size: 0.8em;
            opacity: 0.7;
            margin-left: 5px;
        }
        
        .current-pool-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #6c5ce7;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }
        .toast.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* User Info Bar */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .player-name { font-size: 1.8em; }
            .current-bid { font-size: 2em; }
            .btn-bid { font-size: 1.2em; padding: 15px 30px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏏 Summer Premier League</h1>
            <p class="subtitle">Player Auction 2026</p>
        </header>
        
        <!-- Login Screen -->
        <div id="loginScreen">
            <div class="login-box">
                <h2>🔐 Login</h2>
                <div class="form-group">
                    <label>Select Role</label>
                    <select id="roleSelect">
                        <option value="">-- Choose --</option>
                        <option value="team1">🔴 Royal Strikers</option>
                        <option value="team2">🔵 Thunder Kings</option>
                        <option value="team3">🟢 Super Chargers</option>
                        <option value="team4">🟡 Fire Eagles</option>
                        <option value="admin">👑 Auctioneer (Admin)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="passwordInput" placeholder="Enter password">
                </div>
                <button class="btn btn-primary" onclick="login()">Enter Auction</button>
                <p id="loginError" style="color:#ff6b6b; margin-top:15px; text-align:center;"></p>
            </div>
        </div>
        
        <!-- Main App -->
        <div id="mainApp">
            <!-- User Bar -->
            <div class="user-bar">
                <div class="user-info">
                    <span class="user-badge" id="userBadge">Team</span>
                    <span id="userName">User</span>
                </div>
                <button class="btn btn-danger" onclick="logout()" style="padding:8px 15px;">Logout</button>
            </div>
            
            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">Total Players</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statUpcoming">0</div>
                    <div class="stat-label">Upcoming</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statSold">0</div>
                    <div class="stat-label">Sold</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statUnsold">0</div>
                    <div class="stat-label">Unsold</div>
                </div>
            </div>
            
            <!-- Admin Panel (only for admin) -->
            <div class="admin-panel" id="adminPanel" style="display:none;">
                <h3>👑 Auctioneer Controls</h3>
                
                <!-- Pool Selector -->
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:8px; opacity:0.8;">Select Pool:</label>
                    <div class="pool-selector" id="poolSelector"></div>
                </div>
                
                <button class="btn btn-admin" onclick="adminAction('next')">⏭️ Next Player</button>
                <button class="btn btn-admin" onclick="adminAction('sold')">✅ SOLD!</button>
                <button class="btn btn-admin" onclick="adminAction('unsold')">❌ Unsold</button>
                <button class="btn btn-danger" onclick="adminAction('reset')" style="margin-left:20px;">🔄 Reset All</button>
            </div>
            
            <!-- Current Auction Block -->
            <div class="auction-block" id="auctionBlock">
                <div id="auctionContent">
                    <p class="waiting-msg">⏳ Waiting for auctioneer to start...</p>
                </div>
            </div>
            
            <!-- Bid Button (for teams) -->
            <div id="bidSection" style="text-align:center; margin-bottom:20px; display:none;">
                <button class="btn btn-bid" id="bidBtn" onclick="placeBid()">
                    💰 BID +50
                </button>
                <p id="bidMsg" style="margin-top:10px; opacity:0.7;"></p>
            </div>
            
            <!-- Teams Grid -->
            <div class="teams-grid" id="teamsGrid"></div>
            
            <!-- Players List -->
            <div class="players-section">
                <h3>📋 All Players</h3>
                <table class="players-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Pool</th>
                            <th>Base</th>
                            <th>Status</th>
                            <th>Sold To</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody id="playersBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // ───────── State ─────────
        let currentUser = null;  // { role, name, password }
        let ws = null;
        let state = null;
        
        // ───────── Login ─────────
        async function login() {
            const role = document.getElementById('roleSelect').value;
            const password = document.getElementById('passwordInput').value;
            
            if (!role || !password) {
                document.getElementById('loginError').textContent = 'Please select role and enter password';
                return;
            }
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, password })
                });
                const data = await res.json();
                
                if (res.ok && data.ok) {
                    currentUser = { role, name: data.name, password };
                    showApp();
                    connectWebSocket();
                    loadPlayers();
                } else {
                    document.getElementById('loginError').textContent = data.detail || 'Login failed';
                }
            } catch (e) {
                document.getElementById('loginError').textContent = 'Connection error';
            }
        }
        
        function logout() {
            currentUser = null;
            if (ws) ws.close();
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
        
        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            
            // Setup user badge
            const badge = document.getElementById('userBadge');
            badge.textContent = currentUser.role === 'admin' ? '👑 ADMIN' : '🏏 TEAM';
            badge.style.background = currentUser.role === 'admin' ? '#6c5ce7' : '#4CAF50';
            document.getElementById('userName').textContent = currentUser.name;
            
            // Show admin panel
            document.getElementById('adminPanel').style.display = currentUser.role === 'admin' ? 'block' : 'none';
            
            // Show bid section for teams
            document.getElementById('bidSection').style.display = currentUser.role !== 'admin' ? 'block' : 'none';
        }
        
        // ───────── WebSocket ─────────
        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws`);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'state') {
                    state = data;
                    updateUI();
                }
            };
            
            ws.onclose = () => {
                setTimeout(connectWebSocket, 2000);
            };
        }
        
        // ───────── Update UI ─────────
        function updateUI() {
            if (!state) return;
            
            // Stats
            document.getElementById('statTotal').textContent = state.stats.total;
            document.getElementById('statUpcoming').textContent = state.stats.upcoming;
            document.getElementById('statSold').textContent = state.stats.sold;
            document.getElementById('statUnsold').textContent = state.stats.unsold;
            
            // Pool selector (admin only)
            updatePoolSelector();
            
            // Auction Block
            updateAuctionBlock();
            
            // Teams
            updateTeamsGrid();
            
            // Bid button state
            updateBidButton();
        }
        
        function updatePoolSelector() {
            if (currentUser.role !== 'admin') return;
            
            const selector = document.getElementById('poolSelector');
            const poolIcons = {
                'Marquee': '⭐',
                'Batsman': '🏏',
                'Bowler': '🎯',
                'All-Rounder': '💪'
            };
            
            selector.innerHTML = (state.pools || []).map(pool => {
                const stats = state.pool_stats?.[pool] || {};
                const isActive = state.current_pool === pool;
                return `
                    <button class="pool-btn ${isActive ? 'active' : ''}" onclick="setPool('${pool}')">
                        ${poolIcons[pool] || '📋'} ${pool}
                        <span class="pool-count">(${stats.upcoming || 0}/${stats.total || 0})</span>
                    </button>
                `;
            }).join('');
        }
        
        async function setPool(pool) {
            try {
                const res = await fetch('/api/admin/set_pool', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: currentUser.password, pool })
                });
                const data = await res.json();
                if (data.ok) {
                    showToast(`Switched to ${pool} pool`);
                } else {
                    showToast(data.msg || 'Failed to switch pool');
                }
            } catch (e) {
                showToast('Connection error');
            }
        }
        
        function updateAuctionBlock() {
            const content = document.getElementById('auctionContent');
            const status = state.auction_status;
            const player = state.current_player;
            
            // Show current pool info
            const poolBadge = `<span class="current-pool-badge">📦 ${state.current_pool || 'Marquee'} Pool</span>`;
            
            if (status === 'waiting' || !player) {
                const poolStats = state.pool_stats?.[state.current_pool] || {};
                content.innerHTML = `
                    ${poolBadge}
                    <p class="waiting-msg">⏳ Waiting for next player from ${state.current_pool} pool...</p>
                    <p style="opacity:0.5; font-size:0.9em;">${poolStats.upcoming || 0} players remaining in this pool</p>
                `;
                return;
            }
            
            if (status === 'sold') {
                content.innerHTML = `${poolBadge}<p class="status-sold">✅ SOLD!</p>`;
                return;
            }
            
            if (status === 'unsold') {
                content.innerHTML = `${poolBadge}<p class="status-unsold">❌ UNSOLD</p>`;
                return;
            }
            
            // Active bidding
            const bidderName = state.current_bidder ? 
                state.teams.find(t => t.team_id === state.current_bidder)?.name || state.current_bidder : 
                'No bids yet';
            
            content.innerHTML = `
                ${poolBadge}
                <div class="player-name">${player.name}</div>
                <div class="player-role">${player.role} • ${player.pool || 'Marquee'}</div>
                <div class="player-base">Base Price: ₹${player.base_price}</div>
                <div class="bid-display">
                    <div class="current-bid">₹${state.current_bid}</div>
                    <div class="current-bidder">Highest Bid: ${bidderName}</div>
                </div>
            `;
        }
        
        function updateTeamsGrid() {
            const grid = document.getElementById('teamsGrid');
            grid.innerHTML = state.teams.map(team => {
                const isMine = team.team_id === currentUser.role;
                const squadHtml = team.squad.map(p => `
                    <div class="squad-player">
                        <span>${p.name} (${p.role})</span>
                        <span class="price">₹${p.sold_price}</span>
                    </div>
                `).join('') || '<p style="opacity:0.5;font-size:0.9em;">No players yet</p>';
                
                return `
                    <div class="team-card ${isMine ? 'mine' : ''}" style="border-color:${team.color}">
                        <div class="team-header">
                            <span class="team-name" style="color:${team.color}">${team.name}</span>
                            <span class="team-budget">₹${team.budget}</span>
                        </div>
                        <div style="font-size:0.9em;opacity:0.7;margin-bottom:10px;">
                            Squad: ${team.squad_count} players
                        </div>
                        <div class="team-squad">${squadHtml}</div>
                    </div>
                `;
            }).join('');
        }
        
        function updateBidButton() {
            if (currentUser.role === 'admin') return;
            
            const btn = document.getElementById('bidBtn');
            const msg = document.getElementById('bidMsg');
            const canBid = state.auction_status === 'bidding' && state.current_bidder !== currentUser.role;
            
            btn.disabled = !canBid;
            
            if (state.auction_status !== 'bidding') {
                msg.textContent = 'Waiting for next player...';
            } else if (state.current_bidder === currentUser.role) {
                msg.textContent = '✅ You are the highest bidder!';
            } else {
                const myTeam = state.teams.find(t => t.team_id === currentUser.role);
                const newBid = state.current_bid + 50;
                if (myTeam && myTeam.budget < newBid) {
                    msg.textContent = '❌ Not enough budget!';
                    btn.disabled = true;
                } else {
                    msg.textContent = `Click to bid ₹${newBid}`;
                }
            }
        }
        
        // ───────── Actions ─────────
        async function placeBid() {
            try {
                const res = await fetch('/api/bid', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        team_id: currentUser.role,
                        password: currentUser.password
                    })
                });
                const data = await res.json();
                if (!data.ok) {
                    showToast(data.msg || 'Bid failed');
                }
            } catch (e) {
                showToast('Connection error');
            }
        }
        
        async function adminAction(action) {
            if (action === 'reset' && !confirm('Are you sure? This will reset the entire auction!')) {
                return;
            }
            
            try {
                const res = await fetch(`/api/admin/${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: currentUser.password })
                });
                const data = await res.json();
                if (data.msg) {
                    showToast(data.msg);
                }
            } catch (e) {
                showToast('Connection error');
            }
        }
        
        // ───────── Players List ─────────
        async function loadPlayers() {
            try {
                const res = await fetch('/api/players');
                const players = await res.json();
                const tbody = document.getElementById('playersBody');
                
                const poolIcons = {
                    'Marquee': '⭐',
                    'Batsman': '🏏',
                    'Bowler': '🎯',
                    'All-Rounder': '💪'
                };
                
                tbody.innerHTML = players.map((p, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${p.name}</td>
                        <td>${p.role}</td>
                        <td>${poolIcons[p.pool] || '📋'} ${p.pool || 'Marquee'}</td>
                        <td>₹${p.base_price}</td>
                        <td><span class="status-badge status-${p.status}">${p.status}</span></td>
                        <td>${p.sold_to ? state?.teams.find(t => t.team_id === p.sold_to)?.name || p.sold_to : '-'}</td>
                        <td>${p.sold_price ? '₹' + p.sold_price : '-'}</td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Failed to load players', e);
            }
        }
        
        // Refresh player list when state updates
        const originalUpdateUI = updateUI;
        updateUI = function() {
            originalUpdateUI();
            loadPlayers();
        };
        
        // ───────── Toast ─────────
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // ───────── Enter key login ─────────
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
